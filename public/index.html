<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A2A Demo Agent</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  .header { padding: 12px 20px; border-bottom: 1px solid #21262d; display: flex; align-items: center; gap: 12px; background: #010409; }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header .tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #1f6feb; color: #fff; }
  .header .status { margin-left: auto; font-size: 12px; color: #8b949e; display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot-green { background: #238636; } .dot-yellow { background: #d29922; } .dot-red { background: #da3633; }

  /* Remote Agent Card */
  .agent-card { padding: 12px 20px; border-bottom: 1px solid #21262d; background: #161b22; display: flex; align-items: center; gap: 16px; }
  .agent-card .card-left { flex-shrink: 0; }
  .agent-card .card-avatar { width: 40px; height: 40px; border-radius: 8px; background: #1f6feb; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .agent-card .card-info { flex: 1; }
  .agent-card .card-name { font-size: 14px; font-weight: 600; }
  .agent-card .card-desc { font-size: 12px; color: #8b949e; margin-top: 2px; }
  .agent-card .card-skills { display: flex; gap: 6px; margin-top: 4px; }
  .agent-card .skill-badge { font-size: 11px; padding: 2px 8px; border-radius: 8px; background: #21262d; color: #8b949e; }
  .agent-card .card-right { flex-shrink: 0; text-align: right; }
  .agent-card .card-url { font-size: 11px; color: #8b949e; }
  .agent-card .card-state { font-size: 11px; margin-top: 2px; }
  .card-state.ok { color: #238636; } .card-state.err { color: #da3633; } .card-state.wait { color: #d29922; }

  /* Chat */
  .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 75%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: #1f6feb; color: #fff; border-bottom-right-radius: 4px; }
  .msg.agent { align-self: flex-start; background: #161b22; border: 1px solid #30363d; border-bottom-left-radius: 4px; }
  .msg.remote { align-self: flex-start; background: #0d2818; border: 1px solid #238636; border-bottom-left-radius: 4px; }
  .msg.system { align-self: center; font-size: 12px; color: #8b949e; background: none; padding: 4px 0; max-width: 100%; }
  .msg .role { font-size: 11px; font-weight: 600; margin-bottom: 4px; opacity: 0.7; }

  /* Input */
  .input-area { padding: 12px 20px; border-top: 1px solid #21262d; display: flex; gap: 8px; background: #010409; }
  .input-area textarea { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 10px; padding: 10px 14px; color: #e6edf3; font-size: 14px; resize: none; outline: none; font-family: inherit; min-height: 44px; max-height: 120px; }
  .input-area textarea:focus { border-color: #1f6feb; }
  .input-area button { padding: 8px 20px; border-radius: 10px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; white-space: nowrap; }
  .btn-send { background: #238636; color: #fff; }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-discuss { background: #1f6feb; color: #fff; }
  .btn-discuss:disabled { opacity: 0.4; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>🔗 A2A Demo Agent</h1>
  <span class="tag">port 4100</span>
  <div class="status">
    <span class="status-dot dot-yellow" id="statusDot"></span>
    <span id="statusText">Connecting...</span>
  </div>
</div>

<!-- Remote Agent Card -->
<div class="agent-card" id="agentCardSection">
  <div class="card-left">
    <div class="card-avatar">🌐</div>
  </div>
  <div class="card-info">
    <div class="card-name" id="cardName">Loading remote agent...</div>
    <div class="card-desc" id="cardDesc"></div>
    <div class="card-skills" id="cardSkills"></div>
  </div>
  <div class="card-right">
    <div class="card-url" id="cardUrl"></div>
    <div class="card-state wait" id="cardState">等待連線</div>
  </div>
</div>

<!-- Chat -->
<div class="chat-area" id="chatArea">
  <div class="msg system">👋 歡迎！直接聊天或按「💬 討論」跟遠端 Agent 對話</div>
</div>

<!-- Input -->
<div class="input-area">
  <textarea id="input" rows="1" placeholder="輸入訊息... (Enter 送出, Shift+Enter 換行)"></textarea>
  <button class="btn-send" id="btnSend" onclick="sendChat()">送出</button>
  <button class="btn-discuss" id="btnDiscuss" onclick="sendDiscuss()">💬 討論</button>
</div>

<script>
const BASE = location.origin;
const REMOTE = new URLSearchParams(location.search).get('remote') || 'http://localhost:4097';
let loading = false;
let contextId = null;

// ── Helpers ──
function addMsg(role, text, roleLabel) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (roleLabel) {
    const label = document.createElement('div');
    label.className = 'role';
    label.textContent = roleLabel;
    div.appendChild(label);
  }
  const content = document.createElement('div');
  content.textContent = text;
  div.appendChild(content);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function setLoading(v) {
  loading = v;
  document.getElementById('btnSend').disabled = v;
  document.getElementById('btnDiscuss').disabled = v;
}

// ── Load remote agent card ──
async function loadRemoteCard() {
  try {
    const res = await fetch(`${REMOTE}/.well-known/agent.json`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const card = await res.json();

    document.getElementById('cardName').textContent = card.name || 'Unknown Agent';
    document.getElementById('cardDesc').textContent = card.description || '';
    document.getElementById('cardUrl').textContent = REMOTE;

    const skillsDiv = document.getElementById('cardSkills');
    skillsDiv.innerHTML = '';
    (card.skills || []).forEach(s => {
      const badge = document.createElement('span');
      badge.className = 'skill-badge';
      badge.textContent = s.name || s.id;
      skillsDiv.appendChild(badge);
    });

    document.getElementById('cardState').textContent = '已連線';
    document.getElementById('cardState').className = 'card-state ok';

    document.getElementById('statusDot').className = 'status-dot dot-green';
    document.getElementById('statusText').textContent = `Connected — ${card.name}`;

    return card;
  } catch (err) {
    document.getElementById('cardName').textContent = '❌ 無法連接遠端 Agent';
    document.getElementById('cardDesc').textContent = err.message;
    document.getElementById('cardState').textContent = '離線';
    document.getElementById('cardState').className = 'card-state err';
    document.getElementById('statusDot').className = 'status-dot dot-red';
    document.getElementById('statusText').textContent = 'Remote offline';
    return null;
  }
}

// ── Send: normal chat (local LLM only) ──
async function sendChat() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || loading) return;
  input.value = '';
  input.style.height = 'auto';
  setLoading(true);
  addMsg('user', text);

  await sendToAgent(text, false);
  setLoading(false);
}

// ── Send: discuss with remote agent ──
async function sendDiscuss() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || loading) return;
  input.value = '';
  input.style.height = 'auto';
  setLoading(true);
  addMsg('user', text, '你');
  addMsg('system', '📡 正在與遠端 Agent 討論...');

  await sendToAgent(`跟遠端 Agent 討論：${text}`, true);
  setLoading(false);
}

// ── Core: send to local A2A agent ──
async function sendToAgent(text, isDiscuss) {
  try {
    const res = await fetch(`${BASE}/a2a/jsonrpc`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        jsonrpc: '2.0',
        method: 'message/send',
        params: {
          message: {
            kind: 'message',
            role: 'user',
            messageId: `msg-${Date.now()}`,
            parts: [{ kind: 'text', text }],
            ...(contextId ? { contextId } : {}),
          },
        },
        id: `req-${Date.now()}`,
      }),
    });
    const data = await res.json();

    // Remove "thinking" messages
    const area = document.getElementById('chatArea');
    area.querySelectorAll('.msg.system').forEach(el => {
      if (el.textContent.includes('討論中') || el.textContent.includes('正在與遠端')) el.remove();
    });

    if (data.result) {
      const task = data.result;
      contextId = contextId || task.contextId;
      const artifact = task.artifacts?.[0];
      const responseText = artifact?.parts?.[0]?.text || '(no output)';

      if (isDiscuss) {
        addMsg('remote', responseText, '遠端 Agent 回覆');
      } else {
        addMsg('agent', responseText, 'A2A Demo Agent');
      }
    } else if (data.error) {
      addMsg('system', `❌ ${data.error.message}`);
    }
  } catch (err) {
    addMsg('system', `❌ 連線失敗: ${err.message}`);
  }
}

// ── Keyboard ──
// ⚠️ IME composition: track with ref so Chinese/Japanese Enter doesn't send
let composing = false;
const _input = document.getElementById('input');
_input.addEventListener('compositionstart', () => { composing = true; });
_input.addEventListener('compositionend', () => { composing = false; });
_input.addEventListener('keydown', (e) => {
  if (composing || e.isComposing || e.keyCode === 229) return;
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});
// Auto-resize textarea
document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// ── Init ──
loadRemoteCard();
setInterval(loadRemoteCard, 30000); // refresh card every 30s
</script>
</body>
</html>
